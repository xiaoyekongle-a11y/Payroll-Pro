<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>特定商取引法に基づく表記</title>
<style>body { font-family: sans-serif; padding: 2rem; line-height: 1.6; max-width: 800px; margin: auto; } h1 { font-size: 1.5rem; border-bottom: 1px solid #ccc; padding-bottom: 0.5rem; } table { width: 100%; border-collapse: collapse; margin-top: 1rem; } th, td { border: 1px solid #ddd; padding: 10px; } th { background: #f9f9f9; text-align: left; width: 30%; }</style>
</head>
<body>
  <h1>特定商取引法に基づく表記</h1>

    <tr><th>販売事業者</th><td>（請求があり次第提供致しますので、必要な方はお問い合わせください）</td></tr>
    <tr><th>運営責任者</th><td>（請求があり次第提供致しますので、必要な方はお問い合わせください）</td></tr>
    <tr><th>所在地</th><td>（請求があり次第提供致しますので、必要な方はお問い合わせください）</td></tr>
    <tr><th>お問い合わせ先</th><td>メール：support@example.com</td></tr>
  </table>
</body>
</html>
